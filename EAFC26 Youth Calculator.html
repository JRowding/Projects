<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EAFC26 Youth Academy Calculator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
 
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
 
        .calculator {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 400px;
            width: 100%;
        }
 
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 24px;
        }
 
        .input-group {
            margin-bottom: 20px;
        }
 
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
        }
 
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
 
        input:focus {
            outline: none;
            border-color: #667eea;
        }
 
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
            margin-top: 10px;
        }
 
        button:hover {
            transform: translateY(-2px);
        }
 
        button:active {
            transform: translateY(0);
        }
 
        .result {
            margin-top: 30px;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            font-size: 24px;
            font-weight: 600;
            display: none;
        }
 
        .result.show {
            display: block;
        }
 
        .sign-him {
            background-color: #d5f4e6;
            color: #0a7d3e;
            border: 2px solid #0a7d3e;
        }
 
        .release-him {
            background-color: #fee;
            color: #c33;
            border: 2px solid #c33;
        }
 
        .saved-players {
            margin-top: 30px;
            display: none;
        }
 
        .saved-players.show {
            display: block;
        }
 
        .saved-players h2 {
            font-size: 18px;
            color: #333;
            margin-bottom: 15px;
            text-align: center;
        }
 
        .player-list {
            background: #f5f5f5;
            border-radius: 8px;
            padding: 15px;
            max-height: 300px;
            overflow-y: auto;
        }
 
        .player-item {
            background: white;
            padding: 10px;
            margin-bottom: 8px;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
        }
 
        .player-item:last-child {
            margin-bottom: 0;
        }
 
        .player-stats {
            color: #555;
        }
 
        .player-score {
            font-weight: 700;
            color: #0a7d3e;
        }
 
        .clear-btn {
            margin-top: 10px;
            padding: 8px;
            font-size: 14px;
            background: #dc3545;
        }
 
        .clear-btn:hover {
            background: #c82333;
        }
    </style>
</head>
<body>
    <div class="calculator">
        <h1>EAFC 26 Youth Academy Calculator</h1>
        
        <div class="input-group">
            <label for="actual">Player's Lowest Actual (0-100):</label>
            <input type="number" id="actual" min="0" max="100" placeholder="Enter actual rating">
        </div>
 
        <div class="input-group">
            <label for="potential">Player's Lowest Potential (0-100):</label>
            <input type="number" id="potential" min="0" max="100" placeholder="Enter potential rating">
        </div>
 
        <button onclick="calculate()">Calculate</button>
 
        <div id="result" class="result">
            <div id="verdict"></div>
        </div>
 
        <div id="savedPlayers" class="saved-players">
            <h2>✅ Players to Sign (100+)</h2>
            <div id="playerList" class="player-list"></div>
            <button class="clear-btn" onclick="clearSavedPlayers()">Clear All</button>
        </div>
    </div>
 
    <script>
        // Load saved players from localStorage
        let savedPlayers = JSON.parse(localStorage.getItem('fifaPlayers')) || [];
        
        function displaySavedPlayers() {
            const savedPlayersDiv = document.getElementById('savedPlayers');
            const playerListDiv = document.getElementById('playerList');
            
            if (savedPlayers.length === 0) {
                savedPlayersDiv.classList.remove('show');
                return;
            }
            
            savedPlayersDiv.classList.add('show');
            playerListDiv.innerHTML = savedPlayers.map((player, index) => `
                <div class="player-item">
                    <span class="player-stats">Actual: ${player.actual} | Potential: ${player.potential}</span>
                    <span class="player-score">Score: ${player.score}</span>
                </div>
            `).join('');
        }
        
        function calculate() {
            const actual = parseFloat(document.getElementById('actual').value);
            const potential = parseFloat(document.getElementById('potential').value);
            
            if (isNaN(actual) || isNaN(potential)) {
                alert('Please enter both values');
                return;
            }
 
            if (actual < 0 || actual > 100 || potential < 0 || potential > 100) {
                alert('Values must be between 0 and 100');
                return;
            }
 
            // Calculate: Potential - Actual + Potential
            const outcome = potential - actual + potential;
            
            const resultDiv = document.getElementById('result');
            const verdictDiv = document.getElementById('verdict');
            
            // Remove all classes
            resultDiv.classList.remove('sign-him', 'release-him');
            
            // Determine verdict
            if (outcome >= 100) {
                verdictDiv.textContent = 'SIGN HIM! ✅';
                resultDiv.classList.add('sign-him');
                
                // Save this player combo
                const playerCombo = {
                    actual: actual,
                    potential: potential,
                    score: outcome,
                    timestamp: new Date().toISOString()
                };
                
                // Check if this exact combo already exists
                const exists = savedPlayers.some(p => p.actual === actual && p.potential === potential);
                if (!exists) {
                    savedPlayers.push(playerCombo);
                    localStorage.setItem('fifaPlayers', JSON.stringify(savedPlayers));
                    displaySavedPlayers();
                }
            } else {
                verdictDiv.textContent = 'Release him ❌';
                resultDiv.classList.add('release-him');
            }
            
            resultDiv.classList.add('show');
        }
        
        function clearSavedPlayers() {
            if (confirm('Are you sure you want to clear all saved players?')) {
                savedPlayers = [];
                localStorage.removeItem('fifaPlayers');
                displaySavedPlayers();
            }
        }
 
        // Allow Enter key to calculate
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                calculate();
            }
        });
        
        // Display saved players on load
        displaySavedPlayers();
    </script>
</body>
</html>
